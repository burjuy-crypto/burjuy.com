# SITE_URL: https://burjuy.com  (single source of truth — also referenced in
# index.html canonical/OG, sitemap.xml, robots.txt and README.md DNS section).

[build]
  publish = "."

[build.environment]
  SITE_URL = "https://burjuy.com"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
